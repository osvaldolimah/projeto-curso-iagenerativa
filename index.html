<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ChatBot B3 - Financeiro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f4f4f9; }
        #chat-box { width: 400px; height: 300px; border: 1px solid #ccc; background: white; padding: 10px; overflow-y: scroll; margin-bottom: 10px; border-radius: 8px; }
        input { width: 320px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Consultor de Ações B3</h2>
    <div id="chat-box"></div>
    <div>
        <input type="text" id="userInput" placeholder="Ex: Quanto está a Vale?">
        <button onclick="enviarParaN8N()">Enviar</button>
    </div>

    <script>
        async function enviarParaN8N() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const mensagem = input.value;

            if(!mensagem) return;

            // Mostra a pergunta no chat
            chatBox.innerHTML += `<p><strong>Você:</strong> ${mensagem}</p>`;
            input.value = '';

            try {
                // CHAME SUA URL DE PRODUÇÃO DO N8N AQUI
                const response = await fetch('http://159.203.134.102:5678/webhook/v1/chat-financeiro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: mensagem })
                });

                const data = await response.json();
                
                // O n8n por padrão no nó Gemini retorna a resposta em 'content.parts[0].text'
                // Ajuste o caminho abaixo conforme o output final do seu fluxo
                const respostaIA = data[0].content.parts[0].text;
                
                chatBox.innerHTML += `<p><strong>Bot:</strong> ${respostaIA}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<p style="color:red">Erro ao conectar com o servidor.</p>`;
            }
        }
    </script>
</body>
</html>
