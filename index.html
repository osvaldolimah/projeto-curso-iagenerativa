<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor de Ações B3 - IA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 450px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9fb; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; line-height: 1.4; font-size: 0.95rem; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: #e9e9eb; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .error-msg { background: #fdecea; color: #d93025; align-self: center; font-size: 0.8rem; border-radius: 8px; border: 1px solid #f5c6cb; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: white; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #007bff; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">B3 Expert AI</div>
    <div id="chat-box">
        <div class="msg bot-msg">Olá! Pergunte sobre qualquer ação da B3 (ex: Vale, Petrobras, Renner).</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Quanto está a Vale?" onkeypress="handleKey(event)">
        <button id="sendBtn" onclick="enviarMensagem()">Enviar</button>
    </div>
</div>

<script>
    // URL ATUALIZADA DO SEU CLOUDFLARE TUNNEL
    const N8N_WEBHOOK_URL = 'https://thunder-spiritual-maximize-none.trycloudflare.com/webhook/v1/chat-financeiro';

    async function enviarMensagem() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const btn = document.getElementById('sendBtn');
        const mensagem = input.value.trim();

        if (!mensagem) return;

        // Adiciona pergunta do usuário na tela
        appendMessage('user', mensagem);
        input.value = '';
        input.disabled = true;
        btn.disabled = true;

        try {
            const response = await fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: mensagem })
            });

            if (!response.ok) {
                throw new Error(`Erro no servidor: ${response.status}`);
            }

            const data = await response.json();
            
            // Navega no JSON do Gemini para encontrar o texto
            // Seguindo o seu log: data[0].content.parts[0].text
            const respostaBot = data[0]?.content?.parts[0]?.text || "Desculpe, não consegui processar o valor agora.";
            
            appendMessage('bot', respostaBot);

        } catch (error) {
            console.error('Erro detalhado:', error);
            appendMessage('error', `Falha na conexão: ${error.message}. Verifique se o n8n está Ativo.`);
        } finally {
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${sender}-msg`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKey(e) {
        if (e.key === 'Enter') enviarMensagem();
    }
</script>

</body>
</html>
